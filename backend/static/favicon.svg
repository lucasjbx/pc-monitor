<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sfondo scuro arrotondato -->
  <rect width="32" height="32" rx="6" fill="#111"/>
  <!-- Cornice monitor -->
  <rect x="3" y="5" width="26" height="17" rx="2.5" fill="none" stroke="#22c55e" stroke-width="2"/>
  <!-- Linea ECG / pulse sul display -->
  <polyline
    points="6,13 9,13 11,8 13.5,18 16,10 18,13 22,13 26,13"
    fill="none" stroke="#22c55e" stroke-width="1.8"
    stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Gambo stand -->
  <line x1="16" y1="22" x2="16" y2="26" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <!-- Base stand -->
  <line x1="11" y1="26" x2="21" y2="26" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
</svg>
